<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>盲文输入工具 — 开发迭代时间线</title>
<link rel="stylesheet" href="./index.css"></link>
</head>
<body>

<div class="header">
  <h1>盲文输入工具 — 开发迭代时间线</h1>
  <p>从零开始的六键盲文输入法网页，为视障人士而构建</p>
  <div class="stats">
    <div class="stat-item"><div class="stat-num" id="statDays"></div><div class="stat-label">天</div></div>
    <div class="stat-item"><div class="stat-num" id="statCommits"></div><div class="stat-label">次提交</div></div>
    <div class="stat-item"><div class="stat-num" id="statModules"></div><div class="stat-label">个模块</div></div>
    <div class="stat-item"><div class="stat-num" id="statPhases"></div><div class="stat-label">大里程碑</div></div>
  </div>
</div>

<div class="main-wrap">
  <nav class="side-nav" id="sideNav">
    <span class="side-nav-title">PHASES</span>
  </nav>
  <div class="timeline" id="timeline"></div>
</div>

<div class="footer">
  <p>盲文输入工具 &copy; 2026 · <a href="../../">返回主页</a> · 持续迭代中</p>
</div>

<script src="./timeline-data.js"></script>
<script>
(function () {
  var timeline = document.getElementById('timeline');
  var sideNav = document.getElementById('sideNav');
  var html = '';
  var phaseIdx = 0;

  TIMELINE_ENTRIES.forEach(function (e) {
    var id = e.milestone ? ' id="phase-' + phaseIdx + '"' : '';
    var cls = e.milestone ? 'entry milestone' : 'entry';
    html += '<div' + id + ' class="' + cls + '">';
    html += '<div class="entry-date">' + e.date + '</div>';
    html += '<h2>' + e.title + '</h2>';
    html += '<p>' + e.desc + '</p>';
    if (e.tags && e.tags.length) {
      var hiSet = e.hiTags ? new Set(e.hiTags) : new Set();
      html += '<div class="tags">';
      e.tags.forEach(function (t) {
        html += '<span class="tag' + (hiSet.has(t) ? ' hl' : '') + '">' + t + '</span>';
      });
      html += '</div>';
    }
    html += '</div>';

    // 为里程碑生成侧边导航链接
    if (e.milestone) {
      var label = e.title.replace(/^Phase \d+ — /, '');
      var link = document.createElement('a');
      link.href = '#phase-' + phaseIdx;
      link.textContent = 'Phase ' + (phaseIdx + 1) + ' — ' + label;
      link.dataset.phase = phaseIdx;
      sideNav.appendChild(link);
      phaseIdx++;
    }
  });

  timeline.innerHTML = html;

  // 统计数字
  document.getElementById('statDays').textContent = '39';
  document.getElementById('statCommits').textContent = '55+';
  document.getElementById('statModules').textContent = '20+';
  document.getElementById('statPhases').textContent = phaseIdx;

  // ── 侧边导航点击：JS 平滑滚动 + 到达后高亮目标 ──
  navLinks.forEach(function (link) {
    link.addEventListener('click', function (e) {
      e.preventDefault();
      var target = document.getElementById('phase-' + link.dataset.phase);
      if (!target) return;
      // 先手动设置 active（不等 observer 滞后触发）
      navLinks.forEach(function (a) { a.classList.remove('active'); });
      link.classList.add('active');
      // 平滑滚动
      target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      // 到达后短暂闪动目标
      setTimeout(function () {
        target.classList.add('flash');
        setTimeout(function () { target.classList.remove('flash'); }, 700);
      }, 500);
    });
  });
  var navLinks = sideNav.querySelectorAll('a');
  var milestones = timeline.querySelectorAll('.milestone');

  var phaseObserver = new IntersectionObserver(function (entries) {
    entries.forEach(function (entry) {
      if (!entry.isIntersecting) return;
      var idx = Number(entry.target.id.replace('phase-', ''));
      navLinks.forEach(function (a, i) {
        a.classList.toggle('active', i === idx);
      });
    });
  }, { rootMargin: '-30% 0px -60% 0px' });

  milestones.forEach(function (el) { phaseObserver.observe(el); });

  // ── 统计数字跳动 ──
  var statNums = document.querySelectorAll('.stat-num');
  statNums.forEach(function (el) {
    el.style.opacity = '0';
    el.style.transform = 'translateY(10px)';
    el.style.transition = 'opacity .5s ease, transform .5s ease';
  });
  setTimeout(function () {
    statNums.forEach(function (el, i) {
      setTimeout(function () {
        el.style.opacity = '1';
        el.style.transform = 'translateY(0)';
      }, i * 120);
    });
  }, 150);
})();
</script>

</body>
</html>
