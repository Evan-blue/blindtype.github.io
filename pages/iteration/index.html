<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>盲文输入工具 — 开发迭代时间线</title>
<style>
  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --text: #e0e0e0;
    --text-sub: #a0a0b8;
    --accent: #7c6ff7;
    --accent2: #5eead4;
    --tag-bg: #252540;
    --line: #2a2a45;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;
    line-height: 1.6;
    min-height: 100vh;
  }
  .header {
    text-align: center;
    padding: 60px 20px 40px;
    background: linear-gradient(135deg, #1a1a35 0%, #0f0f1a 100%);
    border-bottom: 1px solid var(--line);
  }
  .header h1 {
    font-size: 2.2em;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p {
    color: var(--text-sub);
    margin-top: 8px;
    font-size: 1.05em;
  }
  .stats {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 24px;
    flex-wrap: wrap;
  }
  .stat-item { text-align: center; }
  .stat-num { font-size: 2em; font-weight: 700; color: var(--accent2); }
  .stat-label { font-size: 0.85em; color: var(--text-sub); }

  .timeline {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px 80px;
    position: relative;
  }
  .timeline::before {
    content: '';
    position: absolute;
    left: 48px; top: 0; bottom: 0;
    width: 2px;
    background: var(--line);
  }
  .entry {
    position: relative;
    padding-left: 80px;
    margin-bottom: 40px;
  }
  .entry::before {
    content: '';
    position: absolute;
    left: 39px; top: 6px;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--card);
    border: 3px solid var(--accent);
    z-index: 1;
  }
  .entry.milestone::before {
    background: var(--accent);
    box-shadow: 0 0 12px rgba(124,111,247,.5);
    width: 22px; height: 22px;
    left: 38px; top: 5px;
  }
  .entry-date {
    font-size: 0.85em;
    color: var(--accent2);
    font-weight: 600;
    letter-spacing: .5px;
  }
  .entry h2 {
    font-size: 1.25em;
    margin: 4px 0 6px;
    color: #ececff;
  }
  .entry p {
    color: var(--text-sub);
    font-size: 0.95em;
    max-width: 640px;
  }
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }
  .tag {
    font-size: 0.78em;
    padding: 2px 10px;
    border-radius: 10px;
    background: var(--tag-bg);
    color: var(--text-sub);
  }
  .tag.hl {
    background: rgba(124,111,247,.18);
    color: #b4a7ff;
  }
  .footer {
    text-align: center;
    padding: 24px;
    color: var(--text-sub);
    font-size: 0.82em;
    border-top: 1px solid var(--line);
  }
  .footer a { color: var(--accent); text-decoration: none; }

  @media (max-width: 600px) {
    .timeline { padding: 24px 12px 60px; }
    .timeline::before { left: 24px; }
    .entry { padding-left: 52px; }
    .entry::before { left: 15px; width: 16px; height: 16px; }
    .entry.milestone::before { left: 14px; width: 18px; height: 18px; }
    .header h1 { font-size: 1.5em; }
    .stats { gap: 20px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>盲文输入工具 — 开发迭代时间线</h1>
  <p>从零开始的六键盲文输入法网页，为视障人士而构建</p>
  <div class="stats">
    <div class="stat-item"><div class="stat-num" id="statDays"></div><div class="stat-label">天</div></div>
    <div class="stat-item"><div class="stat-num" id="statCommits"></div><div class="stat-label">次提交</div></div>
    <div class="stat-item"><div class="stat-num" id="statModules"></div><div class="stat-label">个模块</div></div>
    <div class="stat-item"><div class="stat-num" id="statPhases"></div><div class="stat-label">大里程碑</div></div>
  </div>
</div>

<div class="timeline" id="timeline"></div>

<div class="footer">
  <p>盲文输入工具 &copy; 2026 · <a href="../../">返回主页</a> · 持续迭代中</p>
</div>

<script src="./timeline-data.js"></script>
<script>
(function () {
  var timeline = document.getElementById('timeline');
  var html = '';

  TIMELINE_ENTRIES.forEach(function (e) {
    var cls = e.milestone ? 'entry milestone' : 'entry';
    html += '<div class="' + cls + '">';
    html += '<div class="entry-date">' + e.date + '</div>';
    html += '<h2>' + e.title + '</h2>';
    html += '<p>' + e.desc + '</p>';
    if (e.tags && e.tags.length) {
      var hiSet = e.hiTags ? new Set(e.hiTags) : new Set();
      html += '<div class="tags">';
      e.tags.forEach(function (t) {
        html += '<span class="tag' + (hiSet.has(t) ? ' hl' : '') + '">' + t + '</span>';
      });
      html += '</div>';
    }
    html += '</div>';
  });

  timeline.innerHTML = html;

  // 统计数字
  document.getElementById('statDays').textContent = '39';
  document.getElementById('statCommits').textContent = '55+';
  document.getElementById('statModules').textContent = '20+';
  var phases = TIMELINE_ENTRIES.filter(function (e) { return e.milestone; }).length;
  document.getElementById('statPhases').textContent = phases;
})();
</script>

</body>
</html>
